# HTTP
quarkus.http.port=8080

# Redis
quarkus.redis.hosts=redis://localhost:6379

# JSON
quarkus.jackson.fail-on-unknown-properties=true

# Card images - served by the cards-server container (see homelab-stack/),
# reached through the reverse proxy at cards.homelab.local. The backend
# stores no image bytes itself; this is combined with each card's filename
# to produce the URL the frontend renders. Override per environment via the
# DIXIT_CARDS_BASE_URL env var if needed.
dixit.cards.base-url=http://cards.homelab.local

# Dev
quarkus.log.level=INFO
quarkus.log.category."com.burnout.dixit".level=DEBUG

# Structured JSON console logging (for log shipping to Loki/Grafana)
# Human-readable in dev/test, JSON in all other profiles (e.g. when running in the container)
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
